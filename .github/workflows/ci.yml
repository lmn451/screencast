name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p \"require('./package.json').packageManager\")" --activate

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (bundles background.js from src/background.ts)
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test:unit

      - name: Upload coverage artifact (if present)
        if: always() && hashFiles('coverage/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare "$(node -p \"require('./package.json').packageManager\")" --activate

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension
        run: pnpm run build

      - name: Install xvfb for headed browser automation
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Playwright e2e
        run: pnpm run e2e:ci

      - name: Upload E2E artifacts
        if: always() && hashFiles('test-results/e2e/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: test-results/e2e/
          retention-days: 14
