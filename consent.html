<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Before you record — CaptureCast</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        padding: 24px;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8f9fa;
        color: #202124;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        padding: 32px 28px;
        max-width: 360px;
        width: 100%;
      }
      .icon {
        font-size: 48px;
        text-align: center;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 20px;
        text-align: center;
        color: #202124;
      }
      .capture-list {
        margin: 0 0 20px;
        padding-left: 20px;
        line-height: 1.7;
        font-size: 14px;
        color: #444;
      }
      .capture-list li {
        margin-bottom: 4px;
      }
      .note {
        font-size: 13px;
        color: #666;
        margin-bottom: 24px;
        padding: 12px;
        background: #f1f3f4;
        border-radius: 8px;
        text-align: center;
      }
      .buttons {
        display: flex;
        gap: 12px;
      }
      button {
        flex: 1;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: background 0.15s;
      }
      button.primary {
        background: #1a73e8;
        color: #fff;
      }
      button.primary:hover {
        background: #1557b0;
      }
      button.secondary {
        background: #f1f3f4;
        color: #444;
      }
      button.secondary:hover {
        background: #e8eaed;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #9aa0a6;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🎬</div>
      <h1>Before you record</h1>
      <ul class="capture-list" id="capture-list">
        <!-- Dynamic content -->
      </ul>
      <div class="note" id="note">
        <!-- Dynamic content -->
      </div>
      <div class="buttons">
        <button class="secondary" id="btn-cancel">Cancel</button>
        <button class="primary" id="btn-continue">Continue</button>
      </div>
      <div class="footer">Your recordings stay on your device</div>
    </div>
    <script type="module" src="build/consent.js"></script>
  </body>
</html>
