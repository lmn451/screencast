<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CaptureCast</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 12px;
        width: 260px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }
      .mode {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        padding: 8px 10px;
        font-size: 14px;
        border-radius: 8px;
        border: 1px solid #ddd;
        cursor: pointer;
      }
      button.primary {
        background: #1a73e8;
        color: #fff;
        border: none;
      }
      .recording {
        color: #d93025;
        font-weight: 600;
      }
      .option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #444;
      }
      .option input[type='checkbox'] {
        width: 16px;
        height: 16px;
      }
      #status {
        font-size: 12px;
        color: #666;
        min-height: 16px;
        margin-top: 4px;
      }
      #status.error {
        color: #c5221f;
      }
      #status.success {
        color: #1e7e34;
      }
    </style>
  </head>
  <body>
    <h1>CaptureCast</h1>
    <div id="idle-ui" class="mode">
      <button id="btn-record" class="primary">Record</button>
      <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px">
        <button
          id="btn-view-recordings"
          style="width: 100%; background: #f1f3f4; color: #333; border: none"
        >
          View Recordings
        </button>
      </div>
    </div>
    <div id="rec-ui" class="mode" style="display: none">
      <div class="recording">Recording…</div>
      <button id="btn-stop" style="background: #d93025; color: #fff; border: none">
        Stop Recording
      </button>
    </div>
    <div id="status"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
